publisher_joint_trajectory_controller:
  ros__parameters:

    controller_name: "joint_trajectory_position_controller"
    wait_sec_between_publish: 6

    goal_names: ["pos1", "pos2", "pos3", "pos4"]

    # 每个目标的位置数组长度必须和 joints 数量一致
    pos1:
      positions: [0.585, 0.485, 0.0, 0.0, 0.0, 0.0]
    pos2:
      positions: [0.0, 0.2, 0.0, 0.0, 0.0, 0.0]
    pos3:
      positions: [-0.285, -0.385, 0.0, 0.0, 0.0, 0.0]
    pos4:
      positions: [0.0, -0.2, 0.0, 0.0, 0.0, 0.0]

    joints:
      - thumb
      - thumb_aux
      - index
      - middle
      - ring
      - pinky

    check_starting_point: false
    # starting_point_limits:
    #   thumb: [-0.1, 0.1]
    #   thumb_aux: [-0.1, 0.1]
    #   index: [-0.1, 0.1]
    #   middle: [-0.1, 0.1]
    #   ring: [-0.1, 0.1]
    #   pinky: [-0.1, 0.1]
